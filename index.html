<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VZH 2026 — Herní karty</title>
  <link id="theme-css" rel="stylesheet" href="theme-4-tucny.css" />
  <style>
    textarea.form-input {
      resize: none;
      overflow: hidden;
      field-sizing: content;
      line-height: 1.5;
      vertical-align: top;
    }
  </style>
  <script>
    (function() {
      var themes = ['noc','pergamen','sklo','tucny','retro'];
      var t = localStorage.getItem('vzh-theme') || '4';
      document.getElementById('theme-css').href = 'theme-' + t + '-' + themes[+t - 1] + '.css';
    })();
  </script>
</head>
<body>
  <div id="app"></div>

  <dialog id="confirm-dialog">
    <div class="dialog-content">
      <p id="dialog-message"></p>
      <div class="dialog-actions">
        <button class="btn btn-ghost" data-action="cancel-delete">Zrušit</button>
        <button class="btn btn-danger" data-action="confirm-delete">Smazat</button>
      </div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
