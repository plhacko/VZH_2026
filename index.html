<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VZH 2026 — Herní karty</title>
  <link rel="stylesheet" href="theme-4-tucny.css" />
  <style>
    textarea.form-input {
      resize: none;
      overflow: hidden;
      field-sizing: content;
      line-height: 1.5;
      vertical-align: top;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <dialog id="confirm-dialog">
    <div class="dialog-content">
      <p id="dialog-message"></p>
      <div class="dialog-actions">
        <button class="btn btn-ghost" data-action="cancel-delete">Zrušit</button>
        <button class="btn btn-danger" data-action="confirm-delete">Smazat</button>
      </div>
    </div>
  </dialog>

  <script src="app.js"></script>

  <div style="margin-top:2rem;padding:0 1rem 2rem;text-align:center;">
    <img id="mapa-thumb" src="MapaTaboriste.png" alt="Mapa tábořiště"
      style="max-width:340px;width:100%;cursor:zoom-in;border:3px solid #000;box-shadow:4px 4px 0 #000;display:inline-block;" />
  </div>

  <dialog id="mapa-dialog" style="padding:0;border:3px solid #000;box-shadow:8px 8px 0 #000;max-width:95vw;max-height:95vh;background:#fff;">
    <img src="MapaTaboriste.png" alt="Mapa tábořiště" style="display:block;max-width:90vw;max-height:90vh;cursor:zoom-out;" />
  </dialog>

  <script>
    const thumb = document.getElementById('mapa-thumb');
    const dialog = document.getElementById('mapa-dialog');
    thumb.addEventListener('click', () => dialog.showModal());
    dialog.addEventListener('click', () => dialog.close());
  </script>
</body>
</html>
