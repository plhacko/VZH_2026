<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Bitva u Beruny</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #d8d8d8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
  }
  #map-wrapper { background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.35); display: inline-block; }
  /* Scale SVG to fit viewport — constrain by whichever dimension is binding */
  svg {
    display: block;
    width: min(calc(100vw - 20px), calc((100vh - 20px) * 594 / 630));
    height: auto;
  }
  @media print {
    body { background: white; padding: 0; display: block; min-height: unset; }
    #map-wrapper { box-shadow: none; margin: 0; }
    @page { size: A4 landscape; margin: 0; }
    svg { display: block; width: 594mm !important; height: 630mm !important; }
  }
</style>
</head>
<body>
<div id="map-wrapper">
<svg id="map" xmlns="http://www.w3.org/2000/svg"
     width="594mm" height="630mm"
     viewBox="0 0 594 630">
<defs>
  <!-- Forest: 5x6mm line-only pine tree (dense) -->
  <pattern id="pat-forest" x="0" y="0" width="5" height="6" patternUnits="userSpaceOnUse">
    <line x1="2.5" y1="0.4"  x2="2.5" y2="5.6"  stroke="#000" stroke-width="0.30"/>
    <line x1="2.5" y1="1.1"  x2="1.7" y2="2.0"  stroke="#000" stroke-width="0.26"/>
    <line x1="2.5" y1="1.1"  x2="3.3" y2="2.0"  stroke="#000" stroke-width="0.26"/>
    <line x1="1.3" y1="2.0"  x2="2.0" y2="2.0"  stroke="#000" stroke-width="0.22"/>
    <line x1="3.0" y1="2.0"  x2="3.7" y2="2.0"  stroke="#000" stroke-width="0.22"/>
    <line x1="2.5" y1="2.5"  x2="1.4" y2="3.5"  stroke="#000" stroke-width="0.26"/>
    <line x1="2.5" y1="2.5"  x2="3.6" y2="3.5"  stroke="#000" stroke-width="0.26"/>
    <line x1="1.0" y1="3.5"  x2="1.7" y2="3.5"  stroke="#000" stroke-width="0.22"/>
    <line x1="3.3" y1="3.5"  x2="4.0" y2="3.5"  stroke="#000" stroke-width="0.22"/>
    <line x1="2.5" y1="3.8"  x2="1.3" y2="4.8"  stroke="#000" stroke-width="0.26"/>
    <line x1="2.5" y1="3.8"  x2="3.7" y2="4.8"  stroke="#000" stroke-width="0.26"/>
    <line x1="0.9" y1="4.8"  x2="1.6" y2="4.8"  stroke="#000" stroke-width="0.22"/>
    <line x1="3.4" y1="4.8"  x2="4.1" y2="4.8"  stroke="#000" stroke-width="0.22"/>
  </pattern>
</defs>
</svg>
</div>

<script>
const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('map');

// Hex constants
const S        = 20 / Math.sqrt(3);
const HH       = S * Math.sqrt(3);
const HW       = 2 * S;
const COL_STEP = 1.5 * S;
const ROW_STEP = HH;
const MARGIN   = 5;
const COLS     = 33;
const ROWS     = 30;
const STROKE   = 0.22;

// Rarity config (adjust to tune terrain frequency)
const CFG = {
  borderNoise:   0.35,  // second border-tile probability (lower = thicker)
  mtnNoise:      0.965, // interior mountain threshold (raise = rarer)
  forestNoise:   0.970, // interior forest patch threshold
  seaInletNoise: 0.82,  // coastal sea-inlet threshold (cols 27-30)
};

function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, String(v));
  if (parent) parent.appendChild(e);
  return e;
}
function txt(parent, str, attrs) {
  const t = el('text', attrs, parent);
  t.textContent = str;
  return t;
}
function hexCenter(col, row) {
  const x = MARGIN + HW / 2 + col * COL_STEP;
  const y = MARGIN + HH / 2 + row * ROW_STEP + (col % 2 === 1 ? HH / 2 : 0);
  return [x, y];
}
function hexPoints(cx, cy) {
  return Array.from({ length: 6 }, (_, i) => {
    const a = (Math.PI / 3) * i;
    return `${(cx + S * Math.cos(a)).toFixed(2)},${(cy + S * Math.sin(a)).toFixed(2)}`;
  }).join(' ');
}
function noise(c, r, s) {
  const n = c * 47.3 + r * 31.9 + (s || 1) * 73.1;
  return Math.abs(Math.sin(n * 127.1 + 5.7) * 43758.54) % 1;
}

// River: parity-aware connected walk from col 8 to col 30.
// Flat-top offset grid adjacency rule across columns:
//   even col → odd col+1 : valid moves are stay OR row-1 (north only)
//   odd  col → even col+1: valid moves are stay OR row+1 (south only)
// This guarantees every consecutive pair shares a hex edge.
const RIVER_PATH = (function () {
  const START = 8, END = 30, START_ROW = 16;
  const path = {};
  let row = START_ROW;
  path[START] = row;
  for (let col = START + 1; col <= END; col++) {
    const t      = (col - START) / (END - START);
    const target = Math.round((16 - t * 5) + Math.sin(col * 0.8) * 1.2);
    if ((col - 1) % 2 === 0) {
      // previous col was EVEN → transitioning to ODD: can only go north (row-1) or stay
      if (target < row) row--;
    } else {
      // previous col was ODD → transitioning to EVEN: can only go south (row+1) or stay
      if (target > row) row++;
    }
    path[col] = row;
  }
  return path;
}());

function isRiverHex(col, row) { return RIVER_PATH[col] === row; }

const POIS = [
  { col: 19, row: 14, name: 'Berunský most'   },
  { col: 14, row: 18, name: 'Město Beruna'    },
  { col: 10, row: 22, name: 'Taneční louka'   },
  { col: 24, row: 11, name: 'Aslanův pahorek' },
  { col: 28, row:  4, name: 'Cair Paravel'    },
  { col: 18, row:  8, name: 'Kolbiště'        },
  { col: 26, row:  6, name: 'Soví les'        },
  { col: 16, row: 26, name: 'Mirazův tábor'   },
  { col: 10, row: 17, name: 'Brod'            },
];
const POI_SET = new Set(POIS.map(p => p.col + ',' + p.row));

const FILL = {
  fields:    'white',
  forest:    'url(#pat-forest)',
  sea:       'white',
  mountains: 'white',
  river:     '#2a2a2a',
};

function terrain(col, row) {
  if (isRiverHex(col, row))         return 'river';
  if (POI_SET.has(col + ',' + row)) return 'fields';

  if (col >= 31) return 'sea';
  if (col === 30 && noise(col, row, 6) > CFG.borderNoise) return 'sea';

  if (col === 0) return 'forest';
  if (col === 1 && noise(col, row, 2) > CFG.borderNoise) return 'forest';

  if (row === 0) return 'forest';
  if (row === 1 && noise(col, row, 1) > CFG.borderNoise) return 'forest';

  if (row === 29) return 'mountains';
  if (row === 28 && noise(col, row, 4) > CFG.borderNoise) return 'mountains';

  if (col >= 27 && noise(col, row, 7) > CFG.seaInletNoise) return 'sea';
  if (noise(col, row, 8) > CFG.mtnNoise)    return 'mountains';
  if (noise(col, row, 9) > CFG.forestNoise) return 'forest';

  return 'fields';
}

// Two overlapping triangle peaks — taller peak behind, shorter in front (white fill creates depth)
function drawMountainIcon(g, cx, cy) {
  const by = cy + 4;
  el('polygon', {
    points: `${cx-3},${by} ${cx+2},${cy-7} ${cx+7},${by}`,
    fill: 'white', stroke: '#000', 'stroke-width': '0.42', 'stroke-linejoin': 'round',
  }, g);
  el('polygon', {
    points: `${cx-7},${by} ${cx-2},${cy-4} ${cx+3},${by}`,
    fill: 'white', stroke: '#000', 'stroke-width': '0.42', 'stroke-linejoin': 'round',
  }, g);
}

// Three horizontal wave lines, two upward bumps each — classic board game water glyph
function drawSeaIcon(g, cx, cy) {
  for (let i = -1; i <= 1; i++) {
    const wy = cy + i * 3.5;
    el('path', {
      d: `M${cx-6},${wy} Q${cx-3},${wy-2.5} ${cx},${wy} Q${cx+3},${wy-2.5} ${cx+6},${wy}`,
      fill: 'none', stroke: '#000', 'stroke-width': '0.32',
    }, g);
  }
}

function drawCompass(cx, cy) {
  const r = 7;
  const g = el('g', {}, svg);
  el('circle', { cx, cy, r: r + 2.5, fill: 'white', stroke: '#999', 'stroke-width': '0.4' }, g);
  el('line',   { x1: cx, y1: cy - r, x2: cx, y2: cy + r, stroke: '#000', 'stroke-width': '0.4' }, g);
  el('line',   { x1: cx - r, y1: cy, x2: cx + r, y2: cy, stroke: '#000', 'stroke-width': '0.4' }, g);
  el('polygon', { points: `${cx},${cy - r} ${cx - 2},${cy} ${cx + 2},${cy}`, fill: '#000' }, g);
  const la = { 'font-family': 'sans-serif', 'font-size': '4', 'text-anchor': 'middle',
               fill: '#000', 'font-weight': 'bold' };
  txt(g, 'S', { ...la, x: cx,         y: cy - r - 2 });
  txt(g, 'J', { ...la, x: cx,         y: cy + r + 5 });
  txt(g, 'Z', { ...la, x: cx - r - 4, y: cy + 1.5   });
  txt(g, 'V', { ...la, x: cx + r + 4, y: cy + 1.5   });
}

function generate() {
  el('rect', { x: 0, y: 0, width: 594, height: 630, fill: 'white' }, svg);

  const gHex = el('g', { id: 'hexes' }, svg);
  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      const t = terrain(col, row);
      const [cx, cy] = hexCenter(col, row);
      el('polygon', {
        points:         hexPoints(cx, cy),
        fill:           FILL[t],
        stroke:         '#888',
        'stroke-width': STROKE,
      }, gHex);
      if (t === 'mountains') drawMountainIcon(gHex, cx, cy);
      if (t === 'sea')       drawSeaIcon(gHex, cx, cy);
    }
  }

  const gPoi = el('g', { id: 'pois' }, svg);
  for (const p of POIS) {
    const [cx, cy] = hexCenter(p.col, p.row);
    el('circle', { cx, cy, r: 3.0,  fill: '#000'  }, gPoi);
    el('circle', { cx, cy, r: 1.55, fill: 'white' }, gPoi);
    const labelBelow = p.row < 3;
    const labelLeft  = p.col >= 30;
    const ly         = cy + (labelBelow ? 7 : -5);
    const anchor     = labelLeft ? 'end' : (p.col < 3 ? 'start' : 'middle');
    const lx         = labelLeft ? cx - 1 : cx;
    txt(gPoi, p.name, {
      x: lx, y: ly,
      'font-family':  'serif',
      'font-size':    '3.6',
      'font-weight':  'bold',
      'text-anchor':  anchor,
      fill:           '#111',
      stroke:         'white',
      'stroke-width': '1.8',
      'paint-order':  'stroke fill',
    });
  }

  const gG = el('g', { stroke: '#bbb', 'stroke-width': '0.35', 'stroke-dasharray': '4 2.5' }, svg);
  el('line', { x1: 297, y1: 0,   x2: 297, y2: 630 }, gG);
  el('line', { x1: 0,   y1: 210, x2: 594, y2: 210 }, gG);
  el('line', { x1: 0,   y1: 420, x2: 594, y2: 420 }, gG);

  drawCompass(563, 608);
}

generate();
</script>
</body>
</html>
