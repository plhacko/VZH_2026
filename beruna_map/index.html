<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Bitva u Beruny</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #d8d8d8;
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
    gap: 16px;
  }
  #sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-self: flex-start;
  }
  #panel {
    width: 180px;
    min-width: 180px;
    background: white;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    padding: 14px 16px;
    border-radius: 3px;
    font-family: sans-serif;
    font-size: 13px;
    color: #222;
  }
  #panel h2, #rules-panel h2, #sea-panel h2 {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
  }
  #tile-counts { width: 100%; border-collapse: collapse; }
  #tile-counts td { padding: 5px 0; }
  #tile-counts tr + tr td { border-top: 1px solid #eee; }
  #tile-counts td:last-child { text-align: right; font-weight: bold; }
  #rules-panel {
    width: 180px;
    min-width: 180px;
    background: white;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    padding: 14px 16px;
    border-radius: 3px;
    font-family: sans-serif;
    font-size: 12px;
    color: #222;
  }
  .rule { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; }
  .rule + .rule { border-top: 1px solid #eee; }
  .rule svg { flex-shrink: 0; }
  .rule-text strong { display: block; font-size: 11px; margin-bottom: 2px; }
  .rule-text p { margin: 0; font-size: 10.5px; line-height: 1.4; color: #444; }
  .rule-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 3px; }
  .rule-table td { padding: 1px 3px; }
  .rule-table tr:first-child td { color: #999; font-size: 9px; }
  #sea-panel {
    width: 180px; min-width: 180px; background: white;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35); padding: 14px 16px;
    border-radius: 3px; font-family: sans-serif; font-size: 12px; color: #222;
  }
  .sea-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sea-cell { text-align: center; }
  .sea-lbl  { font-size: 9px; color: #777; margin-top: 3px; line-height: 1.3; }
  #map-wrapper { background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.35); display: inline-block; }
  #map {
    display: block;
    width: min(calc(100vw - 226px), calc((100vh - 20px) * 594 / 630));
    height: auto;
  }
  .rule svg { display: block; overflow: hidden; }
  @media print {
    #sidebar { display: none; }
    body { background: white; padding: 0; display: block; min-height: unset; }
    #map-wrapper { box-shadow: none; margin: 0; }
    @page { size: A4 landscape; margin: 0; }
    #map { display: block; width: 594mm !important; height: 630mm !important; }
  }
</style>
</head>
<body>
<div id="sidebar">
  <div id="panel">
    <h2>Typy pol&#237;</h2>
    <table id="tile-counts"><tbody></tbody></table>
  </div>
  <div id="rules-panel"></div>
</div>
<div id="map-wrapper">
<svg id="map" xmlns="http://www.w3.org/2000/svg"
     width="594mm" height="630mm"
     viewBox="0 0 594 630">
<defs></defs>
</svg>
</div>

<script>
const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('map');

// Hex constants
const S        = 20 / Math.sqrt(3);
const HH       = S * Math.sqrt(3);
const HW       = 2 * S;
const COL_STEP = 1.5 * S;
const ROW_STEP = HH;
const MARGIN   = 5;
const COLS     = 33;
const ROWS     = 30;
const STROKE   = 0.22;

// Rarity config (adjust to tune terrain frequency)
const CFG = {
  borderNoise:   0.35,  // second border-tile probability (lower = thicker)
  mtnNoise:      0.965, // interior mountain threshold (raise = rarer)
  forestNoise:   0.970, // interior forest patch threshold
};

// Tiles forced to land regardless of noise (north/NW of Cair Paravel to keep it accessible)
const CP_LAND = new Set(['29,10','29,9','28,11','28,10','27,10']);

function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, String(v));
  if (parent) parent.appendChild(e);
  return e;
}
function txt(parent, str, attrs) {
  const t = el('text', attrs, parent);
  t.textContent = str;
  return t;
}
function hexCenter(col, row) {
  const x = MARGIN + HW / 2 + col * COL_STEP;
  const y = MARGIN + HH / 2 + row * ROW_STEP + (col % 2 === 1 ? HH / 2 : 0);
  return [x, y];
}
function hexPoints(cx, cy) {
  return Array.from({ length: 6 }, (_, i) => {
    const a = (Math.PI / 3) * i;
    return `${(cx + S * Math.cos(a)).toFixed(2)},${(cy + S * Math.sin(a)).toFixed(2)}`;
  }).join(' ');
}
function starPoints(cx, cy, R, r) {
  const pts = [];
  for (let i = 0; i < 10; i++) {
    const a = Math.PI * i / 5 - Math.PI / 2;
    const rad = i % 2 === 0 ? R : r;
    pts.push(`${(cx + rad * Math.cos(a)).toFixed(2)},${(cy + rad * Math.sin(a)).toFixed(2)}`);
  }
  return pts.join(' ');
}
function noise(c, r, s) {
  const n = c * 47.3 + r * 31.9 + (s || 1) * 73.1;
  return Math.abs(Math.sin(n * 127.1 + 5.7) * 43758.54) % 1;
}

// River: parity-aware connected walk from col 8 to col 30.
// Flat-top offset grid adjacency rule across columns:
//   even col → odd col+1 : valid moves are stay OR row-1 (north only)
//   odd  col → even col+1: valid moves are stay OR row+1 (south only)
// This guarantees every consecutive pair shares a hex edge.
const RIVER_PATH = (function () {
  const START = 8, END = 29, START_ROW = 16;
  const path = {};
  let row = START_ROW;
  path[START] = row;
  for (let col = START + 1; col <= END; col++) {
    const t      = (col - START) / (END - START);
    const target = Math.round((16 - t * 5) + Math.sin(col * 0.8) * 1.2);
    if ((col - 1) % 2 === 0) {
      // previous col was EVEN → transitioning to ODD: can only go north (row-1) or stay
      if (target < row) row--;
    } else {
      // previous col was ODD → transitioning to EVEN: can only go south (row+1) or stay
      if (target > row) row++;
    }
    path[col] = row;
  }
  return path;
}());

function isRiverHex(col, row) { return RIVER_PATH[col] === row; }

const POIS = [
  { col: 19, row: 14, name: 'Berunský most'   },
  { col: 18, row: 18, name: 'Město Beruna'    },
  { col: 10, row: 22, name: 'Taneční louka'   },
  { col: 24, row: 11, name: 'Aslanův pahorek' },
  { col: 29, row: 11, name: 'Cair Paravel'    },
  { col: 17, row: 11, name: 'Kolbiště'        },
  { col: 26, row:  6, name: 'Soví les'        },
  { col: 17, row: 20, name: 'Mirazův tábor'   },
  { col: 10, row: 17, name: 'Brod'            },
  // top-left: old Narnian northwest
  { col:  6, row:  7, name: 'Dryádský háj'   },
  { col:  5, row:  2, name: 'Severní věž'    },
  // bottom-right: Telmarine southeast
  { col: 21, row: 24, name: 'Telmarin'        },
  { col: 29, row: 18, name: 'Jižní přístav'  },
  { col: 25, row: 25, name: 'Jižní planina'  },
  // western Narnia
  { col:  3, row: 12, name: 'Lucerna'         },
];
const POI_SET = new Set(POIS.map(p => p.col + ',' + p.row));

const FILL = {
  fields:    'white',
  forest:    '#b8b8b8',
  sea:       '#2a2a2a',
  mountains: '#d0d0d0',
  river:     '#2a2a2a',
};

function terrain(col, row) {
  if (isRiverHex(col, row))         return 'river';
  if (POI_SET.has(col + ',' + row)) return 'fields';

  if (CP_LAND.has(col + ',' + row)) return 'fields'; // land north/NW of Cair Paravel

  if (col >= 31) return 'sea';
  if (col === 30 && noise(col, row, 11) > 0.18) return 'sea'; // ~82% sea — ragged near shore
  if (col === 29 && noise(col, row, 12) > 0.52) return 'sea'; // ~48% sea — rugged inlets
  if (col >= 27   && noise(col, row,  7) > 0.78) return 'sea'; // ~22% sea — deep inlet tips

  if (col === 0) return 'forest';
  if (col === 1 && noise(col, row, 2) > CFG.borderNoise) return 'forest';

  if (row === 0) return 'forest';
  if (row === 1 && noise(col, row, 1) > CFG.borderNoise) return 'forest';

  if (row === 29) return 'mountains';
  if (row === 28 && noise(col, row, 4) > CFG.borderNoise) return 'mountains';
  if (noise(col, row, 8) > CFG.mtnNoise)    return 'mountains';
  if (noise(col, row, 9) > CFG.forestNoise) return 'forest';

  return 'fields';
}

// Two overlapping peaks (grey body, white snow cap) — taller behind, shorter in front
function drawMountainIcon(g, cx, cy) {
  const by = cy + 4;
  const SK = { stroke: '#000', 'stroke-width': '0.42', 'stroke-linejoin': 'round' };
  const CS = { stroke: '#999', 'stroke-width': '0.22', 'stroke-linejoin': 'round' };
  // Back (taller) peak
  el('polygon', { points: `${cx-3},${by} ${cx+2},${cy-7} ${cx+7},${by}`, fill: '#e8e8e8', ...SK }, g);
  // Front (shorter) peak
  el('polygon', { points: `${cx-7},${by} ${cx-2},${cy-4} ${cx+3},${by}`, fill: '#e8e8e8', ...SK }, g);
  // Snow cap on back peak (top 2.5 mm — sides at t=2.5/11 along each edge)
  el('polygon', { points: `${cx+2},${cy-7} ${cx+0.9},${cy-4.5} ${cx+3.1},${cy-4.5}`, fill: 'white', ...CS }, g);
  // Snow cap on front peak (top 2 mm — sides at t=2/8 along each edge)
  el('polygon', { points: `${cx-2},${cy-4} ${cx-3.25},${cy-2} ${cx-0.75},${cy-2}`, fill: 'white', ...CS }, g);
}

// Exact same tree shape as the old pat-forest pattern, tiled at the same absolute 5x6mm
// grid positions (patternUnits="userSpaceOnUse" origin), clipped to the hex boundary.
// Vector lines in the PDF — no rasterisation.
function drawTree(parent, tx, ty) {
  const ln = (x1, y1, x2, y2, sw) => el('line', {
    x1: (tx+x1-2.5).toFixed(2), y1: (ty+y1-3).toFixed(2),
    x2: (tx+x2-2.5).toFixed(2), y2: (ty+y2-3).toFixed(2),
    stroke: '#000', 'stroke-width': sw,
  }, parent);
  ln(2.5,0.4, 2.5,5.6,'0.30'); ln(2.5,1.1, 1.7,2.0,'0.26'); ln(2.5,1.1, 3.3,2.0,'0.26');
  ln(1.3,2.0, 2.0,2.0,'0.22'); ln(3.0,2.0, 3.7,2.0,'0.22');
  ln(2.5,2.5, 1.4,3.5,'0.26'); ln(2.5,2.5, 3.6,3.5,'0.26');
  ln(1.0,3.5, 1.7,3.5,'0.22'); ln(3.3,3.5, 4.0,3.5,'0.22');
  ln(2.5,3.8, 1.3,4.8,'0.26'); ln(2.5,3.8, 3.7,4.8,'0.26');
  ln(0.9,4.8, 1.6,4.8,'0.22'); ln(3.4,4.8, 4.1,4.8,'0.22');
}
function drawForestIcon(g, cx, cy, col, row) {
  const defs   = svg.querySelector('defs');
  const clipId = 'fc' + col + '-' + row;
  const cp     = el('clipPath', { id: clipId }, defs);
  el('polygon', { points: hexPoints(cx, cy) }, cp);
  const fg = el('g', { 'clip-path': 'url(#' + clipId + ')' }, g);
  const xStart = 2.5 + Math.floor((cx - HW / 2 - 2.5) / 5) * 5;
  const yStart = 3.0 + Math.floor((cy - HH / 2 - 3.0) / 6) * 6;
  for (let tx = xStart; tx <= cx + HW / 2 + 5; tx += 5)
    for (let ty = yStart; ty <= cy + HH / 2 + 6; ty += 6)
      drawTree(fg, tx, ty);
}

// ── Sea cross/star patterns ──────────────────────────────
let SEA_PATTERN = 10;
// [gx, gy, stagger]  (coords in same mm units as main hex)
const SEA_GRID = [null,
  [3.5, 3.0, false], // 1  + crosses
  [3.5, 3.0, false], // 2  × marks
  [5.0, 4.0, true],  // 3  6-arm *
  [5.5, 5.0, true],  // 4  8-point ✦
  [3.5, 3.0, true],  // 5  · dots
  [4.5, 3.5, true],  // 6  — h-dashes
  [4.0, 3.5, true],  // 7  / diag dashes
  [4.0, 3.5, false], // 8  +/× noise mix
  [8.0, 7.0, false], // 9  ✚ sparse large
  [4.5, 4.0, true],  // 10 ✦+· stars & dots
];
const SEA_NAMES = ['','+ kříže','× křížky','✶ hvězdy 6','✦ hvězdy 8','· tečky',
                   '— linky','/ šikmé','+/× mix','✚ řídké','✦· hvězdy+tečky'];

function seaCell(g, px, py, pid, n, sc) {
  const sw = sc * 0.28;
  const r  = sc;
  function ln(x1, y1, x2, y2, w) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    e.setAttribute('x1', x1.toFixed(2)); e.setAttribute('y1', y1.toFixed(2));
    e.setAttribute('x2', x2.toFixed(2)); e.setAttribute('y2', y2.toFixed(2));
    e.setAttribute('stroke', 'white');
    e.setAttribute('stroke-width', (w || sw).toFixed(2));
    e.setAttribute('stroke-linecap', 'round');
    g.appendChild(e);
  }
  const d = r * 0.72;
  switch (pid) {
    case 1:  ln(px-r,py,px+r,py); ln(px,py-r,px,py+r); break;
    case 2:  ln(px-d,py-d,px+d,py+d); ln(px+d,py-d,px-d,py+d); break;
    case 3:  for(let i=0;i<3;i++){const a=i*Math.PI/3,c=Math.cos(a)*r,s=Math.sin(a)*r; ln(px-c,py-s,px+c,py+s);} break;
    case 4:  ln(px-r,py,px+r,py); ln(px,py-r,px,py+r); ln(px-d,py-d,px+d,py+d); ln(px+d,py-d,px-d,py+d); break;
    case 5:  ln(px,py,px,py,sw*2.5); break;
    case 6:  ln(px-r*1.3,py,px+r*1.3,py); break;
    case 7:  ln(px-r*.85,py+r*.85,px+r*.85,py-r*.85); break;
    case 8:  if(n>.5){ln(px-r,py,px+r,py);ln(px,py-r,px,py+r);}
             else{ln(px-d,py-d,px+d,py+d);ln(px+d,py-d,px-d,py+d);} break;
    case 9:  { const R=r*1.8; ln(px-R,py,px+R,py,sw*1.3); ln(px,py-R,px,py+R,sw*1.3); break; }
    case 10: if(n>.4){ln(px-r,py,px+r,py);ln(px,py-r,px,py+r);ln(px-d,py-d,px+d,py+d);ln(px+d,py-d,px-d,py+d);}
             else{ln(px,py,px,py,sw*2.5);} break;
  }
}

function drawSeaPattern(g, cx, cy, col, row) {
  const pid = SEA_PATTERN;
  const [gx, gy, stagger] = SEA_GRID[pid];
  const defs = svg.querySelector('defs');
  const clipId = 'sp' + col + '-' + row;
  const cp = el('clipPath', { id: clipId }, defs);
  el('polygon', { points: hexPoints(cx, cy) }, cp);
  const fg = el('g', { 'clip-path': 'url(#' + clipId + ')' }, g);
  const xS = gx * Math.floor((cx - HW/2 - gx) / gx);
  const yS = gy * Math.floor((cy - HH/2 - gy) / gy);
  let ri = 0;
  for (let ty = yS; ty <= cy + HH/2 + gy; ty += gy, ri++) {
    const xo = (stagger && ri % 2) ? gx/2 : 0;
    for (let tx = xS + xo; tx <= cx + HW/2 + gx; tx += gx)
      seaCell(fg, tx, ty, pid, noise(tx * .3, ty * .3), 1.0);
  }
}

// single curling wave centered in the hex
function drawSeaIcon(g, cx, cy) {
  const P = { fill: 'none', stroke: 'white', 'stroke-width': '0.48',
              'stroke-linecap': 'round', 'stroke-linejoin': 'round' };

  // Wave shape adapted from user SVG, shifted +4.75 vertically to center in hex
  el('path', { d:
    `M ${cx-8},${cy+3}` +
    ` C ${cx-5.1},${cy+3.3} ${cx-3.3},${cy+2.8} ${cx-1.7},${cy+1}` +
    ` C ${cx+0.4},${cy-1.2} ${cx+1},${cy-3.6} ${cx+2.5},${cy-4.2}` +
    ` C ${cx+4},${cy-4.5} ${cx+5.1},${cy-4.2} ${cx+5.8},${cy-3.6}` +
    ` C ${cx+4},${cy-3.8} ${cx+2.7},${cy-2.5} ${cx+2.7},${cy-0.8}` +
    ` C ${cx+2.7},${cy+1} ${cx+5.5},${cy+2.5} ${cx+8},${cy+3}`,
    ...P }, g);
}

function drawCompass(cx, cy) {
  const r = 7;
  const g = el('g', {}, svg);
  el('circle', { cx, cy, r: r + 2.5, fill: 'white', stroke: '#999', 'stroke-width': '0.4' }, g);
  el('line',   { x1: cx, y1: cy - r, x2: cx, y2: cy + r, stroke: '#000', 'stroke-width': '0.4' }, g);
  el('line',   { x1: cx - r, y1: cy, x2: cx + r, y2: cy, stroke: '#000', 'stroke-width': '0.4' }, g);
  el('polygon', { points: `${cx},${cy - r} ${cx - 2},${cy} ${cx + 2},${cy}`, fill: '#000' }, g);
  const la = { 'font-family': 'sans-serif', 'font-size': '4', 'text-anchor': 'middle',
               fill: '#000', 'font-weight': 'bold' };
  txt(g, 'S', { ...la, x: cx,         y: cy - r - 2 });
  txt(g, 'J', { ...la, x: cx,         y: cy + r + 5 });
  txt(g, 'Z', { ...la, x: cx - r - 4, y: cy + 1.5   });
  txt(g, 'V', { ...la, x: cx + r + 4, y: cy + 1.5   });
}

function generate() {
  el('rect', { x: 0, y: 0, width: 594, height: 630, fill: 'white' }, svg);

  const gHex = el('g', { id: 'hexes' }, svg);
  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      const t = terrain(col, row);
      const [cx, cy] = hexCenter(col, row);
      el('polygon', {
        points:         hexPoints(cx, cy),
        fill:           FILL[t],
        stroke:         '#888',
        'stroke-width': STROKE,
      }, gHex);
      if (t === 'mountains') drawMountainIcon(gHex, cx, cy);
      if (t === 'sea')       drawSeaPattern(gHex, cx, cy, col, row);
      if (t === 'forest')    drawForestIcon(gHex, cx, cy, col, row);
    }
  }

  const gPoi = el('g', { id: 'pois' }, svg);
  for (const p of POIS) {
    const [cx, cy] = hexCenter(p.col, p.row);
    const poiStroke = isRiverHex(p.col, p.row) ? 'white' : 'black';
    el('polygon', { points: starPoints(cx, cy, 3.0, 1.2), fill: '#000', stroke: poiStroke, 'stroke-width': '0.6', 'stroke-linejoin': 'round' }, gPoi);
    const labelBelow = p.row < 3;
    const labelLeft  = p.col >= 30;
    const ly         = cy + (labelBelow ? 7 : -5);
    const anchor     = labelLeft ? 'end' : (p.col < 3 ? 'start' : 'middle');
    const lx         = labelLeft ? cx - 1 : cx;
    txt(gPoi, p.name, {
      x: lx, y: ly,
      'font-family':  'serif',
      'font-size':    '3.6',
      'font-weight':  'bold',
      'text-anchor':  anchor,
      fill:           '#111',
      stroke:         'white',
      'stroke-width': '1.8',
      'paint-order':  'stroke fill',
    });
  }

  const gG = el('g', { stroke: '#bbb', 'stroke-width': '0.35', 'stroke-dasharray': '4 2.5' }, svg);
  el('line', { x1: 297, y1: 0,   x2: 297, y2: 630 }, gG);
  el('line', { x1: 0,   y1: 210, x2: 594, y2: 210 }, gG);
  el('line', { x1: 0,   y1: 420, x2: 594, y2: 420 }, gG);

  drawCompass(563, 608);
}

function buildPanel() {
  const counts = {};
  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      const t = terrain(col, row);
      counts[t] = (counts[t] || 0) + 1;
    }
  }
  counts.poi = POIS.length;

  const ORDER  = ['fields', 'poi', 'forest', 'mountains', 'sea', 'river'];
  const LABELS = {
    fields:    'Planiny',
    poi:       'Zaj&#237;mav&#225; m&#237;sta',
    forest:    'Les',
    mountains: 'Hory',
    sea:       'Mo&#345;e',
    river:     '&#344;eka',
  };

  const tbody = document.querySelector('#tile-counts tbody');
  for (const key of ORDER) {
    if (counts[key] == null) continue;
    const tr  = document.createElement('tr');
    const tdL = document.createElement('td');
    const tdN = document.createElement('td');
    tdL.innerHTML = LABELS[key];
    tdN.textContent = counts[key];
    tr.appendChild(tdL);
    tr.appendChild(tdN);
    tbody.appendChild(tr);
  }
}


function buildRules() {
  const panel = document.getElementById('rules-panel');
  const h = document.createElement('h2');
  h.textContent = 'Pravidla bodování';
  panel.appendChild(h);

  function msvg(w, h) {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    s.setAttribute('width', w); s.setAttribute('height', h);
    s.setAttribute('viewBox', `0 0 ${w} ${h}`);
    return s;
  }
  function pe(parent, tag, attrs) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    parent.appendChild(e); return e;
  }

  const S7 = 7;
  function hexPts(cx, cy) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i;
      pts.push(`${(cx + S7 * Math.cos(a)).toFixed(1)},${(cy + S7 * Math.sin(a)).toFixed(1)}`);
    }
    return pts.join(' ');
  }
  const HH7 = S7 * Math.sqrt(3);
  const HW7 = 2 * S7;
  function starPts(cx, cy, R, r) {
    const pts = [];
    for (let i = 0; i < 10; i++) {
      const a = Math.PI * i / 5 - Math.PI / 2;
      const rad = i % 2 === 0 ? R : r;
      pts.push(`${(cx + rad * Math.cos(a)).toFixed(2)},${(cy + rad * Math.sin(a)).toFixed(2)}`);
    }
    return pts.join(' ');
  }

  const rules = [
    {
      name: 'Voják',
      text: 'Každý voják 1 bod.',
      svg() {
        const s = msvg(22, 18);
        pe(s, 'polygon', { points: hexPts(11, 9), fill: '#88e', stroke: '#44c', 'stroke-width': 0.8 });
        return s;
      }
    },
    {
      name: 'Formace',
      text: '7 políček v kruhu.',
      svg() {
        const s = msvg(44, 40);
        const cx = 22, cy = 20;
        const nb = [
          [cx, cy - HH7], [cx, cy + HH7],
          [cx + HW7 * 0.75, cy - HH7 / 2], [cx + HW7 * 0.75, cy + HH7 / 2],
          [cx - HW7 * 0.75, cy - HH7 / 2], [cx - HW7 * 0.75, cy + HH7 / 2],
        ];
        for (const [nx, ny] of nb)
          pe(s, 'polygon', { points: hexPts(nx, ny), fill: '#88e', stroke: '#44c', 'stroke-width': 0.7 });
        pe(s, 'polygon', { points: hexPts(cx, cy), fill: '#88e', stroke: '#44c', 'stroke-width': 0.7 });
        return s;
      }
    },
    {
      name: 'Cesta',
      text: 'Body za propojenou síť míst:',
      table: [['Místa', 'Body'], ['2', '10'], ['3', '20'], ['4', '30'], ['5+', '…']],
      svg() {
        // 7 hexes face-connected: path bends right at the middle POI for flavour
        const s = msvg(20, 46);
        const S4 = 4, HH4 = S4 * Math.sqrt(3), HS4 = S4 * 1.5;
        function hp4(hx, hy) {
          const pts = [];
          for (let i = 0; i < 6; i++) {
            const a = Math.PI / 3 * i;
            pts.push(`${(hx + S4 * Math.cos(a)).toFixed(1)},${(hy + S4 * Math.sin(a)).toFixed(1)}`);
          }
          return pts.join(' ');
        }
        const x0 = 5, y0 = 4;
        const hexes = [
          { x: x0,         y: y0,              poi: true  },  // top POI
          { x: x0,         y: y0 + HH4,        poi: false },  // D
          { x: x0 + HS4,   y: y0 + 1.5 * HH4,  poi: false },  // DR — bends right
          { x: x0 + HS4,   y: y0 + 2.5 * HH4,  poi: true  },  // middle POI (offset right)
          { x: x0,         y: y0 + 3   * HH4,  poi: false },  // DL — back left
          { x: x0,         y: y0 + 4   * HH4,  poi: false },  // D
          { x: x0,         y: y0 + 5   * HH4,  poi: true  },  // bottom POI
        ];
        for (const h of hexes) {
          pe(s, 'polygon', { points: hp4(h.x, h.y),
            fill: h.poi ? 'white' : '#88e', stroke: h.poi ? '#888' : '#44c', 'stroke-width': 0.7 });
          if (h.poi) pe(s, 'polygon', { points: starPts(h.x, h.y, 2.2, 0.85), fill: '#555', stroke: 'white', 'stroke-width': '0.4', 'stroke-linejoin': 'round' });
        }
        return s;
      }
    },
    {
      name: 'Obklíčení',
      text: '5 bodů za každou obklíčenou jednotku.',
      svg() {
        // 3 red enemy hexes (triangle), surrounded by 8 blue own-unit hexes + 1 mountain terrain.
        const s = msvg(44, 44);
        const S5 = 5, HH5 = S5 * Math.sqrt(3), HS5 = S5 * 1.5;
        function hp5(hx, hy) {
          const pts = [];
          for (let i = 0; i < 6; i++) {
            const a = Math.PI / 3 * i;
            pts.push(`${(hx + S5 * Math.cos(a)).toFixed(1)},${(hy + S5 * Math.sin(a)).toFixed(1)}`);
          }
          return pts.join(' ');
        }
        // A=bottom-left, B=right, C=top-left (tight triangle, centred ~22,22)
        const ax = 19.5, ay = 26;
        const bx = ax + HS5,  by  = ay - HH5 / 2;
        const ccx = ax,       ccy = ay - HH5;
        function miniMtn(mx, my) {
          const b = my + 1.6;
          const tri = (pts, fill) => pe(s, 'polygon', { points: pts, fill, stroke: '#777', 'stroke-width': 0.25, 'stroke-linejoin': 'round' });
          tri(`${mx-1.2},${b} ${mx+0.8},${my-2.8} ${mx+2.8},${b}`, '#d8d8d8');
          tri(`${mx-2.8},${b} ${mx-0.8},${my-1.6} ${mx+1.2},${b}`, '#d8d8d8');
          tri(`${mx+0.8},${my-2.8} ${mx+0.3},${my-1.8} ${mx+1.3},${my-1.8}`, 'white');
          tri(`${mx-0.8},${my-1.6} ${mx-1.3},${my-0.8} ${mx-0.3},${my-0.8}`, 'white');
        }
        const ring = [
          { x: bx,        y: ay + HH5/2,   t: false },  // A lower-right / B bottom
          { x: ax,        y: ay + HH5,     t: false },  // A bottom
          { x: ax - HS5,  y: ay + HH5/2,   t: false },  // A lower-left
          { x: ax - HS5,  y: by,           t: false },  // A upper-left / C lower-left
          { x: bx,        y: ccy - HH5/2,  t: false },  // B top / C upper-right
          { x: bx + HS5,  y: by - HH5/2,   t: true  },  // B upper-right — mountain terrain
          { x: bx + HS5,  y: by + HH5/2,   t: false },  // B lower-right
          { x: ccx,       y: ccy - HH5,    t: false },  // C top
          { x: ccx - HS5, y: ccy - HH5/2,  t: false },  // C upper-left
        ];
        for (const r of ring) {
          pe(s, 'polygon', { points: hp5(r.x, r.y),
            fill: r.t ? '#e0e0e0' : '#88e', stroke: r.t ? '#bbb' : '#44c', 'stroke-width': 0.7 });
          if (r.t) miniMtn(r.x, r.y);
        }
        for (const [ex, ey, fill, strk] of [[ax, ay, '#e88', '#c44'], [bx, by, '#e88', '#c44'], [ccx, ccy, '#8e8', '#4c4']])
          pe(s, 'polygon', { points: hp5(ex, ey), fill, stroke: strk, 'stroke-width': 0.7 });
        return s;
      }
    },
    {
      name: 'Špeh',
      text: '2 body, musí se dotýkat alespoň 2 jiných barev, a nesmí být v obklíčení.',
      svg() {
        const s = msvg(30, 30);
        const bx = 9, by = 21;
        const gx = bx,          gy = by - HH7;
        const rx = bx + S7*1.5, ry = by - HH7/2;
        pe(s, 'polygon', { points: hexPts(gx, gy), fill: '#8e8', stroke: '#4c4', 'stroke-width': 0.8 });
        pe(s, 'polygon', { points: hexPts(rx, ry), fill: '#e88', stroke: '#c44', 'stroke-width': 0.8 });
        pe(s, 'polygon', { points: hexPts(bx, by), fill: '#88e', stroke: '#44c', 'stroke-width': 0.8 });
        return s;
      }
    },
  ];

  for (const rule of rules) {
    const row = document.createElement('div');
    row.className = 'rule';
    row.appendChild(rule.svg());
    const txt = document.createElement('div');
    txt.className = 'rule-text';
    txt.innerHTML = `<strong>${rule.name}</strong><p>${rule.text}</p>`;
    if (rule.table) {
      const tbl = document.createElement('table');
      tbl.className = 'rule-table';
      for (const [a, b] of rule.table) {
        const tr = tbl.insertRow();
        tr.insertCell().textContent = a;
        tr.insertCell().textContent = b;
      }
      txt.appendChild(tbl);
    }
    row.appendChild(txt);
    panel.appendChild(row);
  }
}

function buildSeaPanel() {
  const ns = 'http://www.w3.org/2000/svg';
  const Sp = 13, HHp = Sp * Math.sqrt(3), HWp = 2 * Sp;
  const W = Math.ceil(HWp + 4), H = Math.ceil(HHp + 4);
  const pcx = W / 2, pcy = H / 2;
  const sc = Sp / S;
  const hpts = Array.from({length:6},(_,i)=>{
    const a=Math.PI/3*i;
    return `${(pcx+Sp*Math.cos(a)).toFixed(1)},${(pcy+Sp*Math.sin(a)).toFixed(1)}`;
  }).join(' ');

  const panel = document.createElement('div');
  panel.id = 'sea-panel';
  const h = document.createElement('h2');
  h.textContent = 'Vzor moře';
  panel.appendChild(h);
  const grid = document.createElement('div');
  grid.className = 'sea-grid';
  panel.appendChild(grid);

  for (let pid = 1; pid <= 10; pid++) {
    const cell = document.createElement('div');
    cell.className = 'sea-cell';

    const psvg = document.createElementNS(ns, 'svg');
    psvg.setAttribute('width', W); psvg.setAttribute('height', H);
    psvg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    const defs = document.createElementNS(ns, 'defs');
    const cp = document.createElementNS(ns, 'clipPath');
    cp.setAttribute('id', `spc${pid}`);
    const cpP = document.createElementNS(ns, 'polygon');
    cpP.setAttribute('points', hpts); cp.appendChild(cpP); defs.appendChild(cp);
    psvg.appendChild(defs);

    const bg = document.createElementNS(ns, 'polygon');
    bg.setAttribute('points', hpts); bg.setAttribute('fill', '#2a2a2a');
    bg.setAttribute('stroke', '#888'); bg.setAttribute('stroke-width', '0.5');
    psvg.appendChild(bg);

    const pg = document.createElementNS(ns, 'g');
    pg.setAttribute('clip-path', `url(#spc${pid})`);
    psvg.appendChild(pg);

    const [gx, gy, stagger] = SEA_GRID[pid];
    const gxp = gx * sc, gyp = gy * sc;
    let ri = 0;
    for (let ty = pcy - HHp/2 - gyp; ty <= pcy + HHp/2 + gyp; ty += gyp, ri++) {
      const xo = (stagger && ri % 2) ? gxp/2 : 0;
      for (let tx = pcx - HWp/2 - gxp + xo; tx <= pcx + HWp/2 + gxp; tx += gxp)
        seaCell(pg, tx, ty, pid, noise(tx, ty), sc);
    }

    cell.appendChild(psvg);
    const lbl = document.createElement('div');
    lbl.className = 'sea-lbl';
    lbl.textContent = pid + ' ' + SEA_NAMES[pid];
    cell.appendChild(lbl);
    grid.appendChild(cell);
  }

  document.getElementById('sidebar').appendChild(panel);
}

generate();
buildPanel();
buildRules();
buildSeaPanel();
</script>
